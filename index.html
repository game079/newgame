<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Touch - 瞬間視と脳トレの数字探しゲーム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 審査対策：コンテンツ量を確保し、視認性を高めるスタイル */
        .info-box {
            margin: 20px auto;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 10px;
            font-size: 14px;
            text-align: left;
            color: #ccc;
            max-width: 400px;
            line-height: 1.6;
            border: 1px solid #444;
        }
        .info-box h2 {
            font-size: 16px;
            color: #ffcc00;
            border-bottom: 1px solid #444;
            margin-top: 0;
            padding-bottom: 5px;
        }
        .footer-links {
            margin-top: 20px;
            padding-bottom: 40px; /* スクロールで見切れないよう余白を確保 */
            text-align: center;
        }
        .footer-links a, .footer-links span {
            color: #888;
            font-size: 12px;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div id="screen-title" class="screen active">
        <h1>Number Touch</h1>
        <button class="mode-btn" onclick="showLevels('NORMAL')">NORMAL</button>
        <button class="mode-btn" onclick="showLevels('HARD')">HARD</button>
        
        <div class="info-box">
            <h2>遊び方・ルール</h2>
            <p>1から順番に、画面上のすべての数字をタップしてクリアタイムを競うゲームです。瞬間的な判断力と集中力を養います。</p>
            <p><strong>NORMAL:</strong> 基本の練習モードです。ミスによるペナルティはありません。</p>
            <p><strong>HARD:</strong> 上級者向け。数字が重なり、回転し、配置がカオスになります。誤タップをすると<strong>タイムに0.5秒のペナルティ</strong>が加算されます。</p>
        </div>

        <div class="footer-links">
            <a href="privacy.html">プライバシーポリシー</a>
            <span style="margin: 0 10px;">|</span>
            <span>Contact: taajdt@gmail.com</span>
        </div>
    </div>

    <div id="screen-level" class="screen">
        <h2 id="level-mode-title">MODE</h2>
        <div id="lv-buttons"></div>
        <button class="back-btn" onclick="toTitle()">BACK</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="timer">0.00</div>
        <div id="game-board"></div>
        <button class="back-btn" onclick="toTitle()">STOP</button>
    </div>

    <div id="screen-result" class="screen modal">
        <div class="result-content">
            <h2>CLEAR!</h2>
            <div class="result-stats">
                <p>TIME: <span id="res-time">0.00</span>s</p>
                <p>LEVEL: <span id="res-lv">1</span></p>
            </div>
            <div class="result-buttons">
                <button onclick="resNext()">NEXT LV</button>
                <button onclick="resRetry()">RETRY</button>
                <button onclick="toTitle()">TITLE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
